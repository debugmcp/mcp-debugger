version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: /mcp_debugger_launcher
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"

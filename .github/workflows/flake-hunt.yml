name: Flake Hunt

# Nightly hunt for order-dependent ("flaky under shuffle") unit tests.
# Seeded shuffle is on in vitest.config.ts; this loops the `unit` project under
# fresh random seeds and prints each seed so any failure reproduces exactly with
# `vitest run --project unit --sequence.seed=<seed>`.
#
# Only the `unit` project is exercised, and unit tests are hermetic/mocked — so
# no language toolchains (Python/Go/Java/...) are installed here. If a unit test
# ever needs one, that is itself a hermeticity bug to fix, not a reason to add it.

on:
  schedule:
    - cron: '0 7 * * *'  # daily 07:00 UTC
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of seeded runs per OS'
        required: false
        default: '10'

permissions: {}

jobs:
  flake-hunt:
    name: Flake Hunt (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false

    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: 22.x
        cache: 'pnpm'

    - name: Install Node dependencies
      run: pnpm install --frozen-lockfile
      env:
        SKIP_ADAPTER_VENDOR: 'true'

    - name: Build project (CI)
      run: pnpm run build:ci

    - name: Run flake hunt
      run: pnpm run test:flake
      env:
        CI: true
        # Hard-fail on process-listener leaks (issues #159/#183)
        LEAK_GUARD_STRICT: '1'
        FLAKE_RUNS: ${{ github.event.inputs.runs || '10' }}

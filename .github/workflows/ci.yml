name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22.x]
        python-version: ['3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
      with:
        version: 10
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Python dependencies
      run: |
        python -m pip install "pip==25.0.1"
        python -m pip install "debugpy==1.8.14"

    - name: Setup Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
      with:
        go-version: '1.21'

    - name: Install Delve debugger
      run: go install github.com/go-delve/delve/cmd/dlv@v1.24.2

    - name: Setup Java 21
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Install Node dependencies
      run: pnpm install --frozen-lockfile
      env:
        SKIP_ADAPTER_VENDOR: 'true'

    - name: Audit dependencies
      run: pnpm audit --prod --audit-level=high
      continue-on-error: true

    - name: Vendor adapter binaries
      run: pnpm run vendor:adapters
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build project
      run: pnpm run build:ci

    - name: Run linting
      run: pnpm run lint

    # Use test:ci-coverage which includes Python tests but excludes e2e tests
    - name: Run tests with coverage
      run: pnpm run test:ci-coverage
      env:
        CI: true
    
    - name: Upload Windows test diagnostics
      if: failure() && matrix.os == 'windows-latest'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: windows-test-diagnostics
        path: |
          tests/**/*.log
          dist/**/*.log
          logs/tests/**/*.log
          logs/tests/adapters/failures/**/*.json
        if-no-files-found: warn
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      if: matrix.os == 'ubuntu-latest'
      with:
        name: coverage-report
        path: coverage/
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
      if: matrix.os == 'ubuntu-latest'
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  windows-python-integration:
    name: Windows Python Integration Focus
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: 22.x
        cache: 'pnpm'

    - name: Setup Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install "pip==25.0.1"
        python -m pip install "debugpy==1.8.14"

    - name: Setup Java 21
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Install Node dependencies
      run: pnpm install --frozen-lockfile
      env:
        SKIP_ADAPTER_VENDOR: 'true'

    - name: Build project (CI)
      run: pnpm run build:ci

    - name: Run targeted Python integration tests
      env:
        CI: true
      run: pnpm vitest run tests/adapters/python/integration/python-discovery.test.ts tests/adapters/python/integration/python_debug_workflow.test.ts

    - name: Upload targeted test diagnostics
      if: failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: windows-python-integration-logs
        path: |
          logs/tests/**/*.log
          logs/tests/adapters/failures/**/*.json
          tests/**/*.log
        if-no-files-found: warn

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
      with:
        version: 10
    
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '22.x'
        cache: 'pnpm'

    - name: Setup Java 21
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        SKIP_ADAPTER_VENDOR: 'true'

    - name: Run ESLint
      run: pnpm run lint
    
    - name: Check for personal information
      run: pnpm run check:all-personal-paths

  # Separate job for container tests on Linux only
  container-tests:
    name: Container Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
      with:
        version: 10
    
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '22.x'
        cache: 'pnpm'
    
    - name: Setup Java 21
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        SKIP_ADAPTER_VENDOR: 'true'

    - name: Vendor adapter binaries
      run: pnpm run vendor:adapters
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run linting
      run: pnpm run lint

    - name: Build project
      run: pnpm run build
      env:
        SKIP_ADAPTER_VENDOR: 'true'

    - name: Build Docker image
      run: docker build -t mcp-debugger:local .
    
    - name: Run container tests
      run: pnpm run test:e2e:container

  test-summary:
    name: Test Summary
    needs: [build-and-test, container-tests]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check test results
      run: |
        echo "✅ CI pipeline completed"
        echo "Check the test results in the build-and-test job"
